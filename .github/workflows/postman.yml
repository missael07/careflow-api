name: Generate Postman Collection

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Use Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Start app & generate OpenAPI
        run: |
          node dist/main.js &
          sleep 10

      - name: Convert to Postman collection
        run: npx openapi2postmanv2 -s openapi.json -o postman-collection.json -p

      - name: Commit collection
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add postman-collection.json
          git commit -m "Auto-update Postman collection" || echo "No changes"
          git push